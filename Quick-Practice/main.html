<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <title>Select Topic</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    @font-face {
      font-family: 'bn';
      src: url(../font/HindSiliguri-Regular.ttf);
    }
    *{
           font-family: 'bn';
    }
    :root {
      --primary: #137547;
      --primary-light: #eaf6f0;
      --border: #e0e0e0;
      --radius: 14px;
      --shadow: 0 2px 12px #0001;
      --bg: #f8f7f4;
      --input-bg: #fff;
      --text: #222;
      --muted: #888;
    }
    body {
      font-family: 'Noto Sans Bengali', Arial, sans-serif;
      background: var(--bg);
      margin: 0;
           font-family: 'bn';
      color: var(--text);
    }
    .container {
      max-width: 420px;
           font-family: 'bn';
      margin: 0 auto;
      background: #fff;
      border-radius: var(--radius);
      padding: 16px 12px 18px 12px;
      box-shadow: var(--shadow);
      min-height: 100vh;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }
    .progress-bar {
      width: 100%;
      height: 5px;
      background: #e0e0e0;
      border-radius: 3px;
      margin-bottom: 18px;
      overflow: hidden;
    }
    .progress {
      height: 100%;
      background-color: rgb(104, 144, 244);
      transition: width .3s;
    }
    h2 {
      font-size: 18px;
      font-weight: 700;
      margin: 0 0 12px 0;
      letter-spacing: .01em;
    }
    .topic-group {
      background: #f7f7f7;
      border-radius: 10px;
      padding: 12px 10px;
      margin-bottom: 12px;
      box-shadow: 0 1px 3px #0001;
    }
    .topic-group-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 7px;
    }
    .topic-group-header label {
      font-weight: 600;
      font-size: 15px;
      color: var(--text);
      flex: 1;
      cursor: pointer;
    }
    .topic-group-header small {
      color: var(--muted);
      font-size: 13px;
    }
    .topic-list {
      margin-left: 25px;
      margin-top: 2px;
    }
    .topic-item {
      display: flex;
      align-items: center;
      background: var(--input-bg);
      border-radius: 7px;
      padding: 8px 8px;
      margin-bottom: 7px;
      font-size: 15px;
      transition: background .2s;
      border: 1px solid var(--border);
    }
    .topic-item input[type="checkbox"] {
      accent-color: var(--primary);
      margin-right: 10px;
      transform: scale(1.1);
    }
    .topic-item label {
      flex: 1;
      cursor: pointer;
      font-size: 15px;
    }
    .topic-count {
      font-size: 12px;
      color: var(--muted);
      margin-left: 8px;
      min-width: 50px;
      text-align: right;
    }
    .input-row {
      margin: 18px 0 10px 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    input[type="number"] {
      width: 70px;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 15px;
      background: var(--input-bg);
    }
    .btn{
      background-color: rgb(45, 45, 253);
      border: none;
      color: white;
      border-radius: 8px;
      padding: 12px 18px;
      font-size: 16px;
      margin-top: 7px;
      margin-right: 7px;
      transition: background .2s;
    }
    .btn-secondary {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 18px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 7px;
      margin-right: 7px;
      transition: background .2s;
      font-weight: 600;
    }
    .btn:active { background: #0412b1; }
    .btn-secondary {
      background: #fff;
      color: var(--primary);
      border: 1px solid var(--primary);
    }
    .add-topic-btn {
      margin-top: 7px;
      background: #f2f7f2;
      color: var(--primary);
      border: 1px solid var(--primary);
      font-size: 15px;
      padding: 10px 10px;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      transition: background .2s;
    }
    .add-topic-btn:active { background: #e6f5e6; }
    .subpage, .exam-page, .result-page { display: none; }
    .toggle-btn {
      background: #f5f5f5;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 7px 15px;
      cursor: pointer;
      margin-left: 12px;
      font-size: 15px;
      color: #444;
      transition: background .2s, color .2s, border .2s;
    }
    .toggle-btn.active {
      background: #ffeaea;
      border-color: #e44;
      color: #b00;
    }
    .exam-question {
      margin: 16px 0 0 0;
      font-size: 17px;
      font-weight: 500;
      color: #222;
    }
    .options-list {
      margin: 20px 0 0 0;
      display: flex;
      flex-direction: column;
      gap: 13px;
    }
    .option-btn {
      background: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 7px;
      padding: 11px 14px;
      font-size: 15px;
      text-align: left;
      cursor: pointer;
      transition: background .2s, color .2s;
      color: #222;
    }
    .option-btn.selected {
      background: #222;
      color: #fff;
      border-color: #222;
    }
    .option-btn.correct {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .option-btn.incorrect {
      background: #e44;
      color: #fff;
      border-color: #e44;
    }
    .exam-footer {
      margin-top: 25px;
      text-align: right;
    }
    .exam-progress {
      font-size: 14px;
      color: #888;
      margin-bottom: 10px;
      text-align: right;
    }
    .result-summary {
      font-size: 18px;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 10px;
    }
    .result-details {
      margin-top: 15px;
      background: #f8f8f8;
      border-radius: 7px;
      padding: 14px;
      font-size: 15px;
      color: #333;
    }
    .result-details .your-ans { font-weight: bold; }
    .result-details .correct-ans { color: var(--primary); font-weight: bold; }
    .result-details .wrong-ans { color: #e44; font-weight: bold; }
    /* Responsive */
    @media (max-width: 600px) {
      .container { max-width: 100vw; min-height: 100vh; border-radius: 0; box-shadow: none; }
      .topic-list { margin-left: 10px; }
      .input-row { flex-direction: column; align-items: flex-start; gap: 5px; }
      .btn, .btn-secondary, .add-topic-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <!-- Step 1: Topic Selection -->
  <div class="container" id="mainPage">
    <div class="progress-bar"><div class="progress" id="progressStep" style="width:35%"></div></div>
    <h2>Select Topic</h2>
    <div class="topic-group">
      <div class="topic-group-header">
        <input type="checkbox" id="chk_godyo" onchange="toggleParent('godyo')">
        <label for="chk_godyo">গদ্য</label>
        <small>117/4.3K</small>
      </div>
      <div class="topic-list" id="godyoSubtopics">
        <div class="topic-item">
          <input type="checkbox" id="godyo1" data-parent="godyo">
          <label for="godyo1">সাহিত্যে খেলা</label>
          <span class="topic-count">0/171</span>
        </div>
        <div class="topic-item">
          <input type="checkbox" id="godyo2" data-parent="godyo">
          <label for="godyo2">গদ্য কাব্য</label>
          <span class="topic-count">0/222</span>
        </div>
        <div class="topic-item">
          <input type="checkbox" id="godyo3" data-parent="godyo">
          <label for="godyo3">অর্ধাঙ্গী</label>
          <span class="topic-count">0/225</span>
        </div>
        <div class="topic-item">
          <input type="checkbox" id="godyo4" data-parent="godyo">
          <label for="godyo4">যৌবনের গান</label>
          <span class="topic-count">0/197</span>
        </div>
        <div class="topic-item">
          <input type="checkbox" id="godyo5" data-parent="godyo">
          <label for="godyo5">কপিলদাস সুমুদ্র শেষ কাজ</label>
          <span class="topic-count">0/115</span>
        </div>
        <div class="topic-item">
          <input type="checkbox" id="godyo6" data-parent="godyo">
          <label for="godyo6">বিদ্যল</label>
          <span class="topic-count">0/139</span>
        </div>
        <div class="topic-item">
          <input type="checkbox" id="godyo7" data-parent="godyo">
          <label for="godyo7">বাজলার নব লেখকদের প্র...</label>
          <span class="topic-count">0/237</span>
        </div>
        <div class="topic-item">
          <input type="checkbox" id="godyo8" data-parent="godyo">
          <label for="godyo8">অপরিচিতা</label>
          <span class="topic-count">18/454</span>
        </div>
      </div>
    </div>
    <div class="topic-group">
      <div class="topic-group-header">
        <input type="checkbox" id="chk_podyo" onchange="toggleParent('podyo')">
        <label for="chk_podyo">পদ্য</label>
        <small>114/3.2K</small>
      </div>
      <div class="topic-list" id="podyoSubtopics">
        <div class="topic-item">
          <input type="checkbox" id="podyo1" data-parent="podyo">
          <label for="podyo1">কবিতা</label>
          <span class="topic-count">0/120</span>
        </div>
        <div class="topic-item">
          <input type="checkbox" id="podyo2" data-parent="podyo">
          <label for="podyo2">ছড়া</label>
          <span class="topic-count">0/80</span>
        </div>
        <div class="topic-item">
          <input type="checkbox" id="podyo3" data-parent="podyo">
          <label for="podyo3">গীতিকবিতা</label>
          <span class="topic-count">0/90</span>
        </div>
        <div class="topic-item">
          <input type="checkbox" id="podyo4" data-parent="podyo">
          <label for="podyo4">প্রবাহমান পদ্য</label>
          <span class="topic-count">0/70</span>
        </div>
        <div class="topic-item">
          <input type="checkbox" id="podyo5" data-parent="podyo">
          <label for="podyo5">আধুনিক পদ্য</label>
          <span class="topic-count">0/100</span>
        </div>
      </div>
    </div>
    <div class="input-row">
      <label for="quesCount">প্রশ্নের সংখ্যা:</label>
      <input type="number" id="quesCount" min="1" max="100" value="25" onchange="syncTimeWithQues()">
    </div>
    <button class="btn" style="width:100%;" onclick="goToSubPage()">Enter</button>
  </div>

  <!-- Step 2: Exam Settings -->
  <div class="container subpage" id="subPage">
    <div class="progress-bar"><div class="progress" style="width:60%"></div></div>
    <h2>পরীক্ষার সেটিংস</h2>
    <div class="input-row">
      <label for="timeSet">সময় (মিনিট):</label>
      <input type="number" id="timeSet" min="1" max="180" value="25">
    </div>
    <div class="input-row">
      <label>নেগেটিভ মার্কিং:</label>
      <button class="toggle-btn" id="negMarkBtn" onclick="toggleNegMark()">On</button>
      <span id="negMarkInfo" style="display:none;">প্রতি ভুল উত্তরে -০.৫</span>
    </div>
    <button class="btn" style="width:100%;" onclick="startExam()">Start Exam</button>
  </div>

  <!-- Step 3: Exam Page (Demo only, not full logic for brevity) -->
  <div class="container exam-page" id="examPage">
    <div class="progress-bar"><div class="progress" style="width:100%"></div></div>
    <div class="exam-progress" id="examProgress"></div>
    <div class="exam-question" id="examQuestion"></div>
    <div class="options-list" id="optionsList"></div>
    <div class="exam-footer">
      <button class="btn-secondary" onclick="prevQuestion()" id="prevBtn" style="display:none;">← আগের</button>
      <button class="btn" onclick="nextQuestion()" id="nextBtn">পরবর্তী</button>
      <button class="btn" style="display:none;" onclick="viewResult()" id="viewResultBtn">View Result</button>
    </div>
  </div>

  <!-- Step 4: Result Page -->
  <div class="container result-page" id="resultPage">
    <div class="result-summary" id="resultSummary"></div>
    <div class="result-details" id="resultDetails"></div>
    <button class="btn" style="width:100%;" onclick="location.reload()">আবার পরীক্ষা দিন</button>
  </div>

  <script>
    // Parent topic select/unselect all subtopics
    function toggleParent(parent) {
      let parentBox = document.getElementById('chk_' + parent);
      let subtopics = document.querySelectorAll('input[data-parent="'+parent+'"]');
      subtopics.forEach(st => st.checked = parentBox.checked);
    }
    // Subtopic unselect করলে parent-ও আনচেক
    document.querySelectorAll('input[data-parent="godyo"],input[data-parent="podyo"]').forEach(st => {
      st.addEventListener('change', function() {
        let parent = this.dataset.parent;
        let all = document.querySelectorAll('input[data-parent="'+parent+'"]');
        let parentBox = document.getElementById('chk_' + parent);
        parentBox.checked = Array.from(all).every(e=>e.checked);
      });
    });

    // প্রশ্নের সংখ্যা অনুযায়ী টাইম অটো সেট
    function syncTimeWithQues() {
      let val = parseInt(document.getElementById('quesCount').value);
      if(val>0) document.getElementById('timeSet').value = val;
    }

    // Next page
    function goToSubPage() {
      // কমপক্ষে ১টা সাব-টপিক সিলেক্ট চেক
      let checked = document.querySelectorAll('input[data-parent]:checked');
      let ques = parseInt(document.getElementById('quesCount').value);
      if(checked.length === 0) {
        alert('কমপক্ষে ১টি সাব-টপিক সিলেক্ট করুন!');
        return;
      }
      if(ques < 1) {
        alert('প্রশ্নের সংখ্যা দিন!');
        return;
      }
      // টাইম sync
      document.getElementById('timeSet').value = ques;
      document.getElementById('mainPage').style.display = 'none';
      document.getElementById('subPage').style.display = 'block';
    }

    // Negative marking
    let negativeMarking = false;
    function toggleNegMark() {
      let btn = document.getElementById('negMarkBtn');
      let info = document.getElementById('negMarkInfo');
      negativeMarking = !negativeMarking;
      if(negativeMarking) {
        btn.classList.add('active');
        btn.innerText = 'Off';
        info.style.display = 'inline';
      } else {
        btn.classList.remove('active');
        btn.innerText = 'On';
        info.style.display = 'none';
      }
    }

    // --- Exam Logic (Demo) ---
    // Dummy questions for demo
    const demoQuestions = [
      {q:'বাংলা সাহিত্যে প্রথম উপন্যাস কোনটি?', options:['আনন্দমঠ','দুর্গেশনন্দিনী','পরিণীতা','কপালকুণ্ডলা'], ans:1},
      {q:'“অপরিচিতা” গল্পের লেখক কে?', options:['রবীন্দ্রনাথ ঠাকুর','কাজী নজরুল','শরৎচন্দ্র চট্টোপাধ্যায়','বিভূতিভূষণ'], ans:0},
      {q:'“গদ্য” শব্দের অর্থ কী?', options:['কবিতা','গল্প','গান','গদ্যরচনা'], ans:3},
      {q:'“পদ্য” কী?', options:['গান','ছড়া','কবিতা','উপন্যাস'], ans:2}
    ];
    let examQuestions = [];
    let userAnswers = [];
    let currentQ = 0;

    function startExam() {
      // ডেমো: শুধু demoQuestions থেকে প্রশ্ন নেবে
      let quesCount = parseInt(document.getElementById('quesCount').value);
      examQuestions = [];
      for(let i=0;i<quesCount;i++) {
        examQuestions.push(demoQuestions[i%demoQuestions.length]);
      }
      userAnswers = Array(examQuestions.length).fill(null);
      currentQ = 0;
      document.getElementById('subPage').style.display = 'none';
      document.getElementById('examPage').style.display = 'block';
      showQuestion();
    }
    function showQuestion() {
      let q = examQuestions[currentQ];
      document.getElementById('examProgress').innerText = `প্রশ্ন ${currentQ+1}/${examQuestions.length}`;
      document.getElementById('examQuestion').innerText = q.q;
      let html = '';
      q.options.forEach((opt, i) => {
        let selected = userAnswers[currentQ] === i ? 'selected' : '';
        html += `<button class="option-btn ${selected}" onclick="selectOption(${i})">${opt}</button>`;
      });
      document.getElementById('optionsList').innerHTML = html;
      document.getElementById('prevBtn').style.display = currentQ > 0 ? 'inline-block' : 'none';
      document.getElementById('nextBtn').style.display = currentQ < examQuestions.length-1 ? 'inline-block' : 'none';
      document.getElementById('viewResultBtn').style.display = currentQ === examQuestions.length-1 ? 'inline-block' : 'none';
    }
    function selectOption(idx) {
      userAnswers[currentQ] = idx;
      let btns = document.querySelectorAll('.option-btn');
      btns.forEach((b,i)=> {
        if(i===idx) b.classList.add('selected');
        else b.classList.remove('selected');
      });
    }
    function nextQuestion() {
      if(userAnswers[currentQ] === null) {
        alert('একটি অপশন সিলেক্ট করুন!');
        return;
      }
      if(currentQ < examQuestions.length-1) {
        currentQ++;
        showQuestion();
      }
    }
    function prevQuestion() {
      if(currentQ > 0) {
        currentQ--;
        showQuestion();
      }
    }
    function viewResult() {
      if(userAnswers[currentQ] === null) {
        alert('একটি অপশন সিলেক্ট করুন!');
        return;
      }
      document.getElementById('examPage').style.display = 'none';
      document.getElementById('resultPage').style.display = 'block';

      let total = examQuestions.length;
      let correct = 0, wrong = 0, marks = 0;
      let details = '';

      examQuestions.forEach((q, i) => {
        let ua = userAnswers[i];
        let ca = q.ans;
        if(ua === ca) {
          correct++;
          marks += 1;
        } else {
          wrong++;
          if(negativeMarking && ua !== null) marks -= 0.5;
        }
        details += `<div style="margin-bottom:10px;">
          <div><b>প্রশ্ন ${i+1}:</b> ${q.q}</div>
          <div>আপনার উত্তর: <span class="your-ans ${ua===ca?'correct-ans':'wrong-ans'}">${ua!==null?q.options[ua]:'নির্বাচিত হয়নি'}</span></div>
          <div>সঠিক উত্তর: <span class="correct-ans">${q.options[ca]}</span></div>
        </div>`;
      });
      marks = Math.max(0, marks);
      document.getElementById('resultSummary').innerHTML = `মোট নম্বর: ${marks} / ${total}<br>সঠিক: ${correct}, ভুল: ${wrong}`;
      document.getElementById('resultDetails').innerHTML = details;
    }
  </script>
</body>
</html>
