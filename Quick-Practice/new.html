<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <title> </title>
  <meta name="viewport" content="width=device-width, user-scalable=no"/>
         <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
         <link rel="stylesheet" href="./style.css">
</head>
<body>
  <!-- Main Page -->
    <button id="back"onclick="window.location.href='../index.html'" id="button"><i class="fa-solid fa-arrow-left fa-lg"></i></button>
  <div class="container" id="mainPage">
    <h2>HSC Bangla 1st </h2>


    <div id="goddo">
      <label><input type="checkbox" id="chk_godyo" onchange="toggleParent('godyo')"> গদ্য</label>
      <div id="godyoSubtopics" style="margin-left:20px;">


        <label><input type="checkbox" data-parent="godyo" id="অপরিচিতা"> অপরিচিতা </label>  <small>( 10 )</small>  <br />


        <label><input type="checkbox" data-parent="godyo" id="বিলাসী"> বিলাসী </label> <small>( 7 )</small><br>


        <label><input type="checkbox" data-parent="godyo" id="আমার_পথ">আমার পথ  </label> <br>


        <label><input type="checkbox" data-parent="godyo" id="godyo4"> মানব কল্যাণ </label> <br>


        <label><input type="checkbox" data-parent="godyo" id="godyo5">  মাসি-পিসি </label> <br>


        <label><input type="checkbox" data-parent="godyo" id="godyo6">বায়ান্নর দিনগুলি  </label> <br>


        <label><input type="checkbox" data-parent="godyo" id="godyo6"> রেইনকোট  </label> <br>


      </div>
    </div>

    <div id="poddo">
      <label><input type="checkbox" id="chk_podyo" onchange="toggleParent('podyo')"> পদ্য</label>
      <div id="podyoSubtopics" style="margin-left:20px;">
        <label><input type="checkbox" data-parent="podyo" id="podyo1">সোনার তরী  </label><br />
        <label><input type="checkbox" data-parent="podyo" id="podyo2">বিদ্রোহী</label> <br>
        <label><input type="checkbox" data-parent="podyo" id="podyo3">প্রতিদান  </label> <br>
        <label><input type="checkbox" data-parent="podyo" id="podyo4"> তাহারেই পড়ে মনে </label> <br>
        <label><input type="checkbox" data-parent="podyo" id="podyo5">  ফেব্রুয়ারি ১৯৬৯ </label> <br>
        <label><input type="checkbox" data-parent="podyo" id="podyo6"> আঠারো বছর বয়স </label> <br>
        <label><input type="checkbox" data-parent="podyo" id="podyo7">  আমি কিংবদন্তির কথা বলছি  </label> <br>
      </div>
    </div>


    <div class="input-row">
  <label>- Negative marking -</label>
  <button class="toggle-btn" id="negMarkBtn" onclick="toggleNegMark()">On</button> 
  <div id="negMarkInfo" style="display:none; color:#e44; font-weight:bold; font-size: 15px;">-0.25 for Every Mistake </div>
</div>

    <div style="margin-top:10px;">
      <label>Question Amount  : <input type="number" id="quesCount" min="1" max="100" value="10" /></label>
    </div>
    <br>
    <button onclick="startExam()" id="start">Start Test</button>
  </div>

  <!-- Exam Page -->
  
  <div class="container" id="examPage" style="display:none;">
     <h3>Bangla 1st Paper</h3> <br>
    <div class="exam-progress" id="timerDisplay">00:00</div>
    <div id="allQuestions"></div>
    <div class="exam-footer">
      <button id="viewResultBtn" onclick="viewResult()">View Result</button>
      <button id="restartBtn" onclick="restartExam()" style="display:visible;">Main page</button>
    </div>
    <div class="result-summary" id="resultSummary"></div>
  </div>


  <script src="./Que-Bank.js"></script>
</body>
</html>
