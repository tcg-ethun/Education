    *{

body {
  margin: 0;
  color: #333;
}
.container {
  max-width: 480px;
  margin: 20px auto;
  background: #fff;
  border-radius: 16px;
  padding: 24px 20px 30px 20px;
  box-shadow: 0 4px 20px rgb(0 0 0 / 0.1);
  min-height: 100vh;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
}
@font-face {
    font-family: 'eng';
    src: url(../font/Poppins-Regular.ttf);
}
h2 {
      font-family: 'eng';
  font-size: 17px;
  font-weight: 700;
  margin-top: -20px;
  display: flex;
  justify-content: center;
  align-items: center;
  margin-bottom: 20px;
  color: #0756d5;
  letter-spacing: 0.02em;
}
input[type="checkbox"] {
  transform: scale(1.2);
  margin-right: 10px;
  cursor: pointer;
}
label {
  font-size: 16px;
  cursor: pointer;
}
.topic-group {
  margin-bottom: 20px;
}
.topic-list {
  margin-left: 30px;
  margin-top: 8px;
}
#start{
    width: 60%;
    margin-left: 20%;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 5px;
    color: white;
    height: 40px;
    border: none;
    background-color: rgb(22, 7, 138);
    border-radius: 7px;
    transition-duration: .2s;
}
#start:active{
    transform: scale(.9);
}

#goddo , #poddo{
    width: 90%;
    background-color: rgb(243, 243, 243);
    padding: 7px;
    border-radius: 5px;
    margin-bottom: 20px;
}
.input-row {
  margin: 20px 0;
  justify-content: center;
  flex-direction: column;
  
  display: flex;
  align-items: center;
  gap: 15px;
}
input[type="number"] {
  width: 80px;
  padding: 8px 12px;
  border-radius: 10px;
  border: 1.5px solid #ccc;
  font-size: 16px;
  transition: border-color 0.3s;
}
input[type="number"]:focus {
  border-color: #137547;
  outline: none;
}
.btn, .btn-secondary {
  background: #137547;
  color: #fff;
  border: none;
  border-radius: 12px;
  padding: 14px 22px;
  font-size: 18px;
  cursor: pointer;
  font-weight: 700;
  transition: background-color 0.3s;
  user-select: none;
}
.btn:hover {
  background: #0f5c3d;
}
.btn:disabled {
  background: #a5d6a7;
  cursor: not-allowed;
}
.btn-secondary {
  background: #fff;
  color: #137547;
  border: 2px solid #137547;
}
.btn-secondary:hover {
  background: #137547;
  color: #fff;
}
.exam-question {
  margin-top: 18px;
  font-size: 18px;
  font-weight: 600;
  color: #222;
}
.options-list {
  margin-top: 12px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.option-btn {
  background: #f0f4f8;
  border: 2px solid #ccc;
  border-radius: 10px;
  padding: 14px 18px;
  font-size: 16px;
  text-align: left;
  cursor: pointer;
  transition: background-color 0.3s, border-color 0.3s;
  color: #333;
  user-select: none;
}
.option-btn:hover:not(:disabled) {
  background-color: #f4f2f2;
}
.option-btn.selected {
  background-color: #000000;
  color: #ffffff;
}
.option-btn.selected:hover{
    background-color: black;
    color: whitesmoke;
    border: none;
}
.option-btn.correct {
  background-color: #1cb25b !important;
  color: #fff !important;
}
.option-btn.incorrect {
  background-color: #e44 !important;
  color: #fff !important;
}
.exam-footer {
  margin-top: 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.exam-progress {
  font-size: 16px;
  color: #666;
  font-weight: 600;
}
.result-summary {
  font-size: 20px;
  font-weight: 700;
  color: #137547;
  margin-top: 25px;
  margin-bottom: 15px;
}
#viewResultBtn{
    background-color: blue;
    color: white;
    border: none;
    padding: 7px;
    transition-duration: .2s;
    width: 100px;
    box-shadow: 0px 05px 15px rgb(223, 223, 223);

}

}

    border: none;
    color: white;

    display: flex;
    justify-content: center;
    align-items: center;
    padding: 7px;
    border: none;

#negMarkInfo{

    justify-content: center;
    align-items: center;

#back{

    border-radius: 50px;
    width: 40px;
    height: 40px;
    background-color: white;
    margin-top: 10px;
    margin-left: 10px;

@media (max-width: 600px) {
  .container {

    border-radius: 0;

    padding: 20px 15px;
  }
  .exam-footer {
    flex-direction: column;
    gap: 15px;
  }
}

         q: "সাহিত্যে খেলা বলতে কী বোঝায়?", 
         options: ["গল্প", "নাটক", "সাহিত্য বিষয়ক প্রশ্ন", "কবিতা"], 
         ans: 2 },
      ]
    };

    // ভেরিয়েবল
    let examQuestions = [];
    let userAnswers = [];
    let timerInterval;
    let timeLeft = 0;

    // নেগেটিভ মার্কিং ভেরিয়েবল
    let negativeMarking = false; // ডিফল্ট বন্ধ
    const negativeMarkValue = 0.5; // প্রতি ভুল উত্তরে -০.৫

    // Helper: shuffle
    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    // Parent checkbox toggle
    function toggleParent(parent) {
      const parentBox = document.getElementById("chk_" + parent);
      const subs = document.querySelectorAll(`input[data-parent="${parent}"]`);
      subs.forEach(s => s.checked = parentBox.checked);
    }

    // নেগেটিভ মার্কিং toggle function (লোকাল স্টোরেজ সহ)
    function toggleNegMark() {
      negativeMarking = !negativeMarking;
      const btn = document.getElementById("negMarkBtn");
      const info = document.getElementById("negMarkInfo");
      
      if (negativeMarking) {
        btn.innerText = "Off";
        info.style.display = "inline";
        info.style.color= "red";
      } else {
        btn.innerText = "On";
        info.style.display = "none";
          info.style.width = "100%";
      }
      
      // লোকাল স্টোরেজে নেগেটিভ মার্কিং স্টেট সেভ করুন
      localStorage.setItem("negativeMarking", JSON.stringify(negativeMarking));
    }

    // Start Exam
    function startExam() {
      // সিলেক্টেড সাব-টপিক সংগ্রহ
      const selectedSubs = Array.from(document.querySelectorAll('input[data-parent]:checked')).map(i => i.id);
      if (selectedSubs.length === 0) {
        alert("কমপক্ষে ১টি সাব-টপিক সিলেক্ট করুন!");
        return;
      }
      const quesCount = parseInt(document.getElementById("quesCount").value);
      if (!quesCount || quesCount < 1) {
        alert("সঠিক প্রশ্নের সংখ্যা দিন!");
        return;
      }

      // প্রশ্ন সংগ্রহ
      let allQuestions = [];
      selectedSubs.forEach(sub => {
        if (questionBank[sub]) {
          allQuestions = allQuestions.concat(questionBank[sub]);
        }
      });

      if (allQuestions.length === 0) {
        alert("সিলেক্টেড সাব-টপিকের জন্য প্রশ্ন পাওয়া যায়নি!");
        return;
      }

      shuffle(allQuestions);
      examQuestions = allQuestions.slice(0, quesCount);
      userAnswers = new Array(examQuestions.length).fill(null);

      // লোকাল স্টোরেজে সেভ (নেগেটিভ মার্কিং স্টেট সহ)
      localStorage.setItem("examQuestions", JSON.stringify(examQuestions));
      localStorage.setItem("userAnswers", JSON.stringify(userAnswers));
      localStorage.setItem("negativeMarking", JSON.stringify(negativeMarking));
      localStorage.setItem("timeLeft", timeLeft.toString());

      renderQuestions();

      // টাইমার সেটআপ (প্রতিটি প্রশ্ন 1 মিনিট ধরে)
      timeLeft = quesCount * 60;
      localStorage.setItem("timeLeft", timeLeft.toString());
      updateTimerDisplay();
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timeLeft--;
        localStorage.setItem("timeLeft", timeLeft.toString());
        updateTimerDisplay();
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          alert("সময় শেষ! পরীক্ষাটি সাবমিট করা হচ্ছে।");
          viewResult();
        }
      }, 1000);

      // UI আপডেট
      document.getElementById("mainPage").style.display = "none";
      document.getElementById("examPage").style.display = "block";
      document.getElementById("viewResultBtn").disabled = false;
      document.getElementById("restartBtn").style.display = "none";
      document.getElementById("resultSummary").innerHTML = "";
    }

    // টাইমার আপডেট
    function updateTimerDisplay() {
      const min = Math.floor(timeLeft / 60).toString().padStart(2, "0");
      const sec = (timeLeft % 60).toString().padStart(2, "0");
      document.getElementById("timerDisplay").innerText = `বাকি সময়: ${min}:${sec}`;
    }

    // প্রশ্ন রেন্ডার
    function renderQuestions() {
      const container = document.getElementById("allQuestions");
      container.innerHTML = "";
      examQuestions.forEach((q, idx) => {
        const div = document.createElement("div");
        div.innerHTML = `
          <div class="exam-question">${idx + 1}. (${q.category}) ${q.q}</div>
          <div class="options-list" id="optionsList${idx}">
            ${q.options.map((opt, i) => `<button class="option-btn" id="opt${idx}_${i}" onclick="selectOption(${idx},${i})">${opt}</button>`).join("")}
          </div>
        `;
        container.appendChild(div);
      });

      // পূর্বের উত্তর থাকলে সিলেক্ট দেখানো
      const savedAnswers = JSON.parse(localStorage.getItem("userAnswers") || "[]");
      savedAnswers.forEach((ans, idx) => {
        if (ans !== null) {
          selectOption(idx, ans, false);
        }
      });
    }

    // অপশন সিলেক্ট
    function selectOption(qidx, optidx, save = true) {
      userAnswers[qidx] = optidx;
      const btns = document.querySelectorAll(`#optionsList${qidx} .option-btn`);
      btns.forEach((btn, i) => {
        btn.classList.toggle("selected", i === optidx);
      });
      if (save) {
        localStorage.setItem("userAnswers", JSON.stringify(userAnswers));
      }
    }

    // রেজাল্ট দেখানো (নেগেটিভ মার্কিং সহ)
    function viewResult() {
      for (let i = 0; i < examQuestions.length; i++) {
        if (userAnswers[i] === null) {
          alert(`প্রশ্ন ${i + 1} এর উত্তর দিন!`);
          return;
        }
      }
      if (timerInterval) clearInterval(timerInterval);

      examQuestions.forEach((q, idx) => {
        const ua = userAnswers[idx];
        const ca = q.ans;
        const btns = document.querySelectorAll(`#optionsList${idx} .option-btn`);
        btns.forEach((btn, i) => {
          btn.disabled = true;
          btn.classList.remove("selected");
          if (i === ca) btn.classList.add("correct");
          if (i === ua && ua !== ca) btn.classList.add("incorrect");
        });
      });

      let correct = 0;
      let wrong = 0;
      examQuestions.forEach((q, i) => {
        if (userAnswers[i] === q.ans) {
          correct++;
        } else {
          wrong++;
        }
      });

      let totalScore = correct;
      if (negativeMarking) {
        totalScore = correct - (wrong * negativeMarkValue);
        if (totalScore < 0) totalScore = 0;
      }

      const total = examQuestions.length;
      let resultText = `মোট নম্বর: ${totalScore.toFixed(2)} / ${total}`;
      if (negativeMarking) {
        resultText += ` (সঠিক: ${correct}, ভুল: ${wrong}, নেগেটিভ: -${(wrong * negativeMarkValue).toFixed(2)})`;
      }
      
      document.getElementById("resultSummary").innerHTML = resultText;
      document.getElementById("viewResultBtn").disabled = true;
      document.getElementById("restartBtn").style.display = "inline-block";

      // লোকাল স্টোরেজ ক্লিয়ার
      localStorage.removeItem("examQuestions");
      localStorage.removeItem("userAnswers");
      localStorage.removeItem("negativeMarking");
      localStorage.removeItem("timeLeft");
    }

    // আবার পরীক্ষা শুরু
    function restartExam() {
      // লোকাল স্টোরেজ সম্পূর্ণ ক্লিয়ার
      localStorage.removeItem("examQuestions");
      localStorage.removeItem("userAnswers");
      localStorage.removeItem("negativeMarking");
      localStorage.removeItem("timeLeft");
      location.reload();
    }

    // পেজ লোড হলে লোকাল স্টোরেজ থেকে ডেটা রিস্টোর করার চেষ্টা
    window.onload = function () {
      const savedQuestions = JSON.parse(localStorage.getItem("examQuestions") || "null");
      const savedAnswers = JSON.parse(localStorage.getItem("userAnswers") || "null");
      const savedNegativeMarking = JSON.parse(localStorage.getItem("negativeMarking") || "false");
      const savedTimeLeft = parseInt(localStorage.getItem("timeLeft") || "0");

      // নেগেটিভ মার্কিং স্টেট রিস্টোর
      negativeMarking = savedNegativeMarking;
      const btn = document.getElementById("negMarkBtn");
      const info = document.getElementById("negMarkInfo");
      
      if (negativeMarking) {
        btn.innerText = "Off";
      } else {
        btn.innerText = "On";
      }

      if (savedQuestions && savedAnswers) {
        examQuestions = savedQuestions;
        userAnswers = savedAnswers;
        timeLeft = savedTimeLeft;
        
        document.getElementById("mainPage").style.display = "none";
        document.getElementById("examPage").style.display = "block";
        renderQuestions();

        document.getElementById("viewResultBtn").disabled = false;
        document.getElementById("restartBtn").style.display = "none";
        document.getElementById("resultSummary").innerHTML = "";
        
        updateTimerDisplay();
        
        // টাইমার চালু করুন
        if (timeLeft > 0) {
          if (timerInterval) clearInterval(timerInterval);
          timerInterval = setInterval(() => {
            timeLeft--;
            localStorage.setItem("timeLeft", timeLeft.toString());
            updateTimerDisplay();
            if (timeLeft <= 0) {
              clearInterval(timerInterval);
              alert("সময় শেষ! পরীক্ষাটি সাবমিট করা হচ্ছে।");
              viewResult();
            }
          }, 1000);
        }
      }
    };
</script>

</body>
