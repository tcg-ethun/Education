<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Minimal Grammar Learning Section</title>
  <style>
    /* Reset */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #fafafa;
      color: #222;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      flex-direction: column;
    }

    .container {
      background: #fff;
      max-width: 700px;
      width: 100%;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 30px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-weight: 700;
      font-size: 28px;
      color: #333;
    }

    /* Tabs */
    .tabs {
      display: flex;
      justify-content: center;
      margin-bottom: 25px;
      border-bottom: 2px solid #e0e0e0;
    }

    .tab {
      padding: 12px 30px;
      cursor: pointer;
      font-weight: 600;
      color: #666;
      border-bottom: 3px solid transparent;
      user-select: none;
      transition: all 0.3s ease;
    }

    .tab:hover {
      color: #007acc;
    }

    .tab.active {
      color: #007acc;
      border-color: #007acc;
    }

    /* Topic list */
    .topics {
      list-style: none;
    }

    .topic-item {
      background: #f9f9f9;
      margin-bottom: 18px;
      border-radius: 8px;
      padding: 20px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
      user-select: none;
      transition: background-color 0.3s ease;
    }

    .topic-item:hover {
      background-color: #e6f0fc;
    }

    .topic-title {
      font-size: 18px;
      font-weight: 600;
      color: #222;
      flex: 1;
    }

    /* Learn button */
    .learn-btn {
      background-color: #007acc;
      border: none;
      color: white;
      padding: 10px 18px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
      transition: background-color 0.3s ease;
      user-select: none;
    }

    .learn-btn:hover {
      background-color: #005fa3;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .topic-item {
        flex-direction: column;
        align-items: flex-start;
      }

      .learn-btn {
        margin-top: 12px;
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Grammar Learning Topics</h1>

    <div class="tabs" role="tablist" aria-label="Language Tabs">
      <div class="tab active" data-lang="english" role="tab" aria-selected="true" tabindex="0">English Grammar</div>
      <div class="tab" data-lang="bangla" role="tab" aria-selected="false" tabindex="-1">Bangla Grammar</div>
    </div>

    <ul class="topics" id="topicsList" aria-live="polite" aria-relevant="additions"></ul>
  </div>

  <script>
    const topicsData = {
      english: [
        { id: 'eng1', title: "Parts of Speech" },
        { id: 'eng2', title: "Tenses" },
        { id: 'eng3', title: "Sentence Structure" },
        { id: 'eng4', title: "Active and Passive Voice" },
        { id: 'eng5', title: "Direct and Indirect Speech" }
      ],
      bangla: [
        { id: 'ban1', title: "ব্যাকরণের পরিচিতি (Introduction to Grammar)" },
        { id: 'ban2', title: "বর্ণমালা (Alphabet)" },
        { id: 'ban3', title: "সন্ধি (Sandhi)" },
        { id: 'ban4', title: "সমাস (Samasa)" },
        { id: 'ban5', title: "ক্রিয়া (Verb)" }
      ]
    };

    const tabs = document.querySelectorAll('.tab');
    const topicsList = document.getElementById('topicsList');
    let currentLang = 'english';

    function renderTopics() {
      topicsList.innerHTML = '';
      topicsData[currentLang].forEach(topic => {
        const li = document.createElement('li');
        li.className = 'topic-item';

        li.innerHTML = `
          <div class="topic-title">${topic.title}</div>
          <button class="learn-btn" aria-label="Learn ${topic.title}">Learn</button>
        `;

        // Placeholder: Add your own event handler for "Learn" button here
        li.querySelector('.learn-btn').addEventListener('click', () => {
          alert(`You clicked Learn for "${topic.title}"`);
          // You can redirect or open modal with lesson content here
        });

        topicsList.appendChild(li);
      });
    }

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        if (tab.classList.contains('active')) return;

        tabs.forEach(t => {
          t.classList.remove('active');
          t.setAttribute('aria-selected', 'false');
          t.setAttribute('tabindex', '-1');
        });

        tab.classList.add('active');
        tab.setAttribute('aria-selected', 'true');
        tab.setAttribute('tabindex', '0');

        currentLang = tab.getAttribute('data-lang');
        renderTopics();
      });

      tab.addEventListener('keydown', e => {
        if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
          e.preventDefault();
          const currentIndex = Array.from(tabs).indexOf(e.target);
          let newIndex;
          if (e.key === 'ArrowRight') {
            newIndex = (currentIndex + 1) % tabs.length;
          } else {
            newIndex = (currentIndex - 1 + tabs.length) % tabs.length;
          }
          tabs[newIndex].focus();
        }
      });
    });

    // Initial render
    renderTopics();
  </script>

</body>
</html>
