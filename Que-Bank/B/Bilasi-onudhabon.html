    <script>
    const allQuestions = [
            {
                id: 1,
                question: " 'ঠিক যেন ফুলদানিতে জল দিয়া ভিজাইয়া রাখা বাসি ফুলের মতো।' বলতে কী বোঝানো হয়েছে? ",
                answer: " উদ্ধৃত উক্তিটির মাধ্যমে অসুস্থ মৃত্যুঞ্জয়ের সেবারত বিলাসীর অবস্থা বোঝানো হয়েছে। 'বিলাসী' গল্পের নায়ক মৃত্যুঞ্জয় অসুস্থ হয়ে পড়লে বিলাসী রাতের পর রাত জেগে তার সেবা-শুশ্রুষা করে। এই নিরবচ্ছিন্ন পরিশ্রমে বিলাসী শারীরিকভাবে দুর্বল হয়ে পড়ে। তার সারা শরীরে একটা অপরিসীম ক্লান্তি ও নিরবচ্ছিন্ন রাত জাগার ছাপ পড়ে যায়। তার এ সজীবতাহীন ও অবসন্ন শরীরকে গল্পের কথক তুলে ধরেছেন উক্তিটির মাধ্যমে।",
                code: "  RB 23 "
            },
            {
                id: 2,
                question: " “গ্রামের মধ্যে মৃত্যুঞ্জয়ের ছিল এমনি সুনাম”- ব্যাখ্যা কর। ",
                answer: " প্রশ্নোক্ত উক্তিটিতে গ্রামের মধ্যে মৃত্যুঞ্জয়ের নেতিবাচক ভাবমূর্তিকে ব্যঙ্গার্থে 'সুনাম' বলা হয়েছে। মৃত্যুঞ্জয় সম্পর্কে উদ্ধৃত উক্তিতে 'সুনাম' শব্দটি গল্পকথক ন্যাড়া 'দুর্নাম' অর্থে ব্যবহার করেছে। আত্মীয়-পরিজনহীন মৃত্যুঞ্জয়ের এক জ্ঞাতি খুড়া ছিল। সে তার নামে দুর্নাম রটনা করে বেড়াত। দুর্নাম রটানোর কারণে গ্রামের মধ্যে মৃত্যুঞ্জয়ের এমন একটা নেতিবাচক ভাবমূর্তি গড়ে উঠেছিল যে, গ্রামবাসী তার সঙ্গে প্রকাশ্যে মেলামেশা দূরে থাক, তার সঙ্গে সংশ্রব থাকার কথাটা পর্যন্ত স্বীকার করত না। নিজ গ্রামে মৃত্যুঞ্জয়ের এমন নেতিবাচক ভাবমূর্তি প্রসঙ্গেই গল্পটিতে উদ্ধৃত উক্তিটির অবতারণা করা হয়েছে। ",
                code: " Din B 24,SB 22  "
            },
            {
                id: 3,
                question: " “একদিন এই মন্ত্রের সত্য-মিথ্যার চরম মীমাংসা হইয়া গেল।”—উক্তিটি বুঝিয়ে লেখ ।  ",
                answer: "  সাপের কাপড়ে মৃত্যুঞ্জয়ের মৃত্যুর মাধ্যমেই সাপ ধরার মন্ত্রের সত্য-মিথ্যার মীমাংসা হয়ে গেল। সাপ ধরার একটি মন্ত্র রয়েছে যেটিকে বিষহরির আজ্ঞা বলা হয়। সেই মন্ত্র বলে সাপকে পোষ মানানো যায়, সাপকে যা বলা যায় সাপ তাই করতে বাধ্য হয়। কিন্তু এটিও ছিল নিছক অন্ধ-বিশ্বাস। গোয়ালার বাড়িতে সাপ ধরতে গিয়ে সাপের কামড়ে মৃত্যুঞ্জয়ের মৃত্যুর মধ্য দিয়েই বিষহরির আজ্ঞা যে নেহায়েত একটি কুসংস্কার, সেটিই প্রমাণিত হয়। ",
                code: "Din B 23   "
            },
            {
                id: 4,
                question: " “ওরে বাপরে! আমি একলা থাকতে পারব না।” উক্তিটি ব্যাখ্যা কর।  ",
                answer: " উক্তিটির মাধ্যমে ন্যাড়া তার এক আত্মীয়ার দৃষ্টান্ত তুলে ধরে তার মেকি স্বামীপ্রেমের প্রতি ইঙ্গিত করেছে।  'বিলাসী' গল্পে ন্যাড়ার এক আত্মীয় মারা গেলে তার বিধবা স্ত্রী শোকাহত হয়ে স্বামীর সঙ্গে সহমরণের জন্য হাহাকার করতে থাকে। কিন্তু লাশের পাশে তাকে একাকী রেখে ন্যাড়া যখন মৃতের সৎকারের জন্য লোক ডাকতে বাইরে পা বাড়ায়, তখনই সে চিৎকার করে উদ্ধৃত উক্তিটি করে। এ ঘটনা থেকে বোঝা যায়, বহুদিনের সাহচর্য সত্ত্বেও হৃদয়ের গভীর সংযোগ ঘটেনি । এভাবে উক্তিটির মধ্য দিয়ে তার মেকি স্বামীপ্রেমের বহিঃপ্রকাশ ঘটেছে।",
                code: "Ctg B 22  "
            },
            {
                id: 5,
                question: " তারা বাস করিতে থাকিলে তো পল্লির এত দুর্দশা হয় না।- ব্যাখ্যা করো।"  ,
                answer: " প্রশ্নোক্ত উক্তিটির মধ্য দিয়ে আর্থিকভাবে সংগতিপূর্ণ ব্যক্তিরা পল্লির প্রতি মনোযোগী হলে সেখানকার দুর্দশা লাঘব হতো বলে মত প্রকাশ করা হয়েছে। পল্লি অঞ্চলে ঋতুভেদে জল, কাদা এবং প্রখর সূর্যতাপ ও ধুলোর পথ পার হয়ে কোমলমতি শিক্ষার্থীরা দূর-দূরান্তের স্কুলে যেত। লেখক মনে করেন, আর্থিকভাবে সচ্ছল ব্যক্তিরা যদি ছেলেমেয়েদের পড়াশোনার জন্য শহরে পাড়ি না জমিয়ে পল্লি অঞ্চলের শিক্ষাব্যবস্থার উন্নতির চেষ্টা করতেন এবং শহরে বসবাসকারী শিক্ষিত উঁচুতলার মানুষেরা যদি পল্লির দিকে সামান্য সুনজর দিতেন, তবে পল্লির এ দুর্দশা আর থাকত না। প্রশ্নোক্ত উক্তিটির মধ্য দিয়ে লেখকের এমন মনোভাবই প্রকাশিত হয়েছে।",
                code: " ICM 23 "
            },
            {
                id: 6,
                question: "  সবাই করে-এতে দোষ কী? উক্তিটি ব্যাখ্যা করো। "  ,
                answer: " 'সবাই করে এতে দোষ কী'- উক্তিটি বলেছেন মৃত্যুঞ্জয়। বুড়ো মালোর মেয়ে বিলাসীকে বিয়ে করে মৃত্যুঞ্জয় জাত সাপুড়ে হয়েছে। সাপুড়েদের প্রধান কাজ হলো সাপ ধরা, সাপের খেলা দেখানো এবং শিকড় বিক্রির ব্যাবসা করা। কিন্তু বিলাসী শিকড় বিক্রি করা একদম পছন্দ করে না কারণ শিকড় বিক্রি করা হলো মানুষের সাথে ধোকাবাজি করা তাই বিলাসী মৃত্যুঞ্জয়কে নিষেধ করে শিকড় বিক্রি করতে। এই প্রেক্ষিতেই মৃত্যুঞ্জয় বিলাসীকে উদ্দেশ করে প্রশ্নোক্ত উক্তিটি করে।",
                code: " SCC 24 "
            },
            {
                id: 7,
                question: " 'আমাদের তো খাবারের ভাবনা নাই আমরা কেন মিছামিছি লোক ঠকাতে যাই'- উক্তিটি ব্যাখ্যা করো।  "  ,
                answer: " মৃত্যুঞ্জয়ের কাছে সাপ ধরার বায়না আসলে বিলাসী নানাভাবে মৃত্যুঞ্জয়কে বাধা দেওয়ার চেষ্টা করত। কাজটার বিরুদ্ধে বিলাসী ভয়ানক আপত্তি করে মৃত্যুঞ্জয়কে আলোচ্য উক্তিটি করেছে। স্বামীকে গভীরভাবে ভালোবাসত বলে তাকে বিপদমুক্ত রাখার জন্য সাপ ধরার বায়না এলে বিলাসী তাতে আপত্তি করত। বিলাসী সাপুড়ের মেয়ে। সাপ ধরতে গিয়ে যেকোনো মুহূর্তে মৃত্যুঞ্জয় বিপদে পড়তে পারে এবং এর পরিণাম যে মৃত্যু পর্যন্তও গড়াতে পারে তা বিলাসী ভালোভাবেই জানত। ফলে সাপ ধরার বায়না এলে বিলাসী মৃত্যুঞ্জয়কে বাধা দেওয়ার চেষ্টা করত। মৃতুঞ্জয়ের প্রতি অগাধ ভালোবাসা থেকেই বিলাসী মৃত্যুঞ্জয়কে সাপ ধরতে বারণ করত। মৃত্যুঞ্জয় ছিল উচ্চবর্ণের, তাই বিলাসীকে নিয়ে খেয়ে পড়ে চলার ভাবনা তাদের ছিল না। তাই সাপ ধরে উপার্জন করার কোনো প্রয়োজন ছিল না মৃত্যুঞ্জয়ের। তবুও মৃত্যুঞ্জয় সাপ ধরত। বিলাসী এটিকে মেনে না নেওয়ার প্রেক্ষিতে আলোচ্য উক্তিটি করে।",
                code: "  MB 23 "
            },
            {
                id: 8,
                question: "   'একলা যেতে ভয় করবে না তো?'- উক্তিটি ব্যাখ্যা করো। "  ,
                answer: " আম বাগানের জমাট বাঁধা অন্ধকারের মধ্য দিয়ে যেতে ভয় করবে কি না তা জানতে চেয়ে বিলাসী ন্যাড়াকে উদ্দেশ করে আলোচ্য উক্তিটি করেছে। দীর্ঘদিন মৃত্যুঞ্জয়ের দেখা না পেয়ে, তার মর-মর অবস্থার কথা জানতে পেরে তাকে দেখতে এসেছিল ন্যাড়া। ফেরার সময় পথ এমনকি নিজের হাতও দেখতে না পাওয়া জমাট অন্ধকারে আম বাগানের ভেতর দিয়ে আসতে যে কারো দারুণ-ভয় পাওয়ার কথা। বিলাসী সে বিষয়টি আঁচ করতে পেরে ন্যাড়ার কাছে জানতে চেয়েছে সে একা যেতে ভয় পাবে কি না।",
                code: "  JCC 24 "
            },
       

        ];








        let currentPage = 0;
        const questionsPerPage = 20;

        function createCard(q) {
            return `
                <div class="question-card" id="card-${q.id}">
                    <div class="question">${q.id}. ${q.question}</div>
                    <div class="badge-row">
                        <span class="badge">${q.code}</span>
                    </div>
                    <button class="solution-btn" id="show-btn-${q.id}" onclick="showSolution(${q.id})">সমাধান দেখো</button>
                    <div class="solution-box" id="solution-${q.id}" onclick="hideSolution(event, ${q.id})">${q.answer}</div>
                </div>
            `;
        }

        function renderQuestions() {
            const container = document.getElementById('questions-container');
            const startIndex = currentPage * questionsPerPage;
            const endIndex = startIndex + questionsPerPage;
            const questionsToShow = allQuestions.slice(startIndex, endIndex);
            
            // নতুন প্রশ্নগুলি যোগ করি
            const newCards = questionsToShow.map(createCard).join('');
            
            // যদি প্রথম পেজ হয় তাহলে রিপ্লেস করি, অন্যথায় যোগ করি
            if (currentPage === 0) {
                container.innerHTML = newCards;
            } else {
                container.innerHTML += newCards;
            }
            
            // লোড বাটন দেখাব কি লুকাব তা ঠিক করি
            const loadMoreBtn = document.getElementById('load-more-btn');
            if (endIndex >= allQuestions.length) {
                loadMoreBtn.style.display = 'none';
            } else {
                loadMoreBtn.style.display = 'block';
            }
        }

        function showSolution(id) {
            document.getElementById(`show-btn-${id}`).style.display = 'none';
            document.getElementById(`solution-${id}`).classList.add('active');
        }

        function hideSolution(event, id) {
            // টেক্সট সিলেক্ট করলে hide হবে না
            if (window.getSelection().toString()) return;
            document.getElementById(`solution-${id}`).classList.remove('active');
            document.getElementById(`show-btn-${id}`).style.display = 'block';
        }

        function loadMoreQuestions() {
            currentPage++;
            renderQuestions();
        }

        // প্রথমবার পেজ লোড হওয়ার সময় প্রথম ২৫টি প্রশ্ন দেখাই
        renderQuestions();

        // লোড বাটনে ক্লিক হ্যান্ডলার যোগ করি
        document.getElementById('load-more-btn').addEventListener('click', loadMoreQuestions);

        // window functions for inline onclick
        window.showSolution = showSolution;
        window.hideSolution = hideSolution;
    </script>
</body>
